[model]
id = "Qwen/Qwen3.6-27B"
local_path = "weights/Qwen3.6-27B"
max_seq_length = 2048

[dataset]
train_jsonl = "data/processed/code_alpaca_20k/train.jsonl"
validation_jsonl = "data/processed/code_alpaca_20k/validation.jsonl"
text_field = "text"

[lora]
r = 16
alpha = 32
dropout = 0.0
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

[training]
output_dir = "adapters/27b"
run_name = "qwen3_6_27b_code_alpaca_qlora"
per_device_train_batch_size = 1
per_device_eval_batch_size = 1
gradient_accumulation_steps = 32
learning_rate = 0.00015
num_train_epochs = 1
warmup_steps = 50
logging_steps = 10
eval_steps = 250
save_steps = 50
max_steps = -1
seed = 0
